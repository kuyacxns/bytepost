<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BytePost - Tech Deep Reads</title>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #eaeaea; --accent: #00e5ff; --border: #222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 0; margin: 0; }
        
        header { text-align: center; padding: 40px 20px; border-bottom: 1px solid var(--border); background: var(--card); }
        header h1 { margin: 0; color: #fff; font-size: 2rem; }
        header span { color: var(--accent); font-weight: bold; }

        #news-container { max-width: 700px; margin: 30px auto; padding: 0 15px; }
        
        .article-card { 
            background: var(--card); border-radius: 16px; margin-bottom: 30px;
            border: 1px solid var(--border); overflow: hidden; transition: 0.3s ease;
        }
        
        /* Bild-Styling */
        .article-image { 
            width: 100%; height: 250px; object-fit: cover; 
            border-bottom: 1px solid var(--border); 
        }

        .article-body { padding: 25px; }

        .date-tag { font-size: 0.75rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        h2 { margin: 10px 0 15px 0; color: #fff; font-size: 1.5rem; line-height: 1.3; }
        
        .content { line-height: 1.7; color: #ccc; font-size: 1rem; }
        .content h3 { color: #fff; margin-top: 20px; font-size: 1.1rem; }
        .content ul { padding-left: 20px; color: #aaa; }
        .content p { margin-bottom: 15px; }

        .meta { font-size: 0.8rem; color: #666; margin-top: 25px; border-top: 1px solid var(--border); padding-top: 15px; text-align: right; }
    </style>
</head>
<body>

    <header>
        <h1><span>Byte</span>Post</h1>
        <p>Tech Deep Reads – Täglich frisch.</p>
    </header>

    <div id="news-container">
        </div>

    <script>
        async function loadNews() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const container = document.getElementById('news-container');
                
                container.innerHTML = data.articles.map(article => `
                    <div class="article-card">
                        ${article.image_local ? `<img src="${article.image_local}" alt="${article.title}" class="article-image">` : ''}
                        <div class="article-body">
                            <span class="date-tag">${article.date} • ${article.source}</span>
                            <h2>${article.title}</h2>
                            <div class="content">${article.content}</div>
                            <div class="meta">🧠 Deep Read: ${article.read}</div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Fehler beim Laden der News:", e);
            }
        }

        loadNews();
    </script>
</body>
</html>
