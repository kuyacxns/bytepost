<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BytePost - TLDR Tech</title>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --accent: #3b82f6; --gray: #f3f4f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 20px; }
        
        #news-container { max-width: 650px; margin: 0 auto; }
        header { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 30px; }
        header h1 { font-size: 1.5rem; margin: 0; font-weight: 800; text-transform: uppercase; }

        /* TLDR Artikel Style */
        .tldr-item { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        
        /* Die Überschrift (Summary) */
        summary { cursor: pointer; list-style: none; outline: none; }
        summary::-webkit-details-marker { display: none; }
        
        .article-headline { font-size: 1.1rem; font-weight: 700; color: var(--accent); text-decoration: none; display: inline; }
        .article-headline:hover { text-decoration: underline; }
        
        .short-teaser { display: inline; color: #4b5563; font-size: 1rem; margin-left: 5px; }

        /* Der Deep Read Bereich (Details) */
        .deep-read-content { 
            background: var(--gray); border-radius: 8px; padding: 20px; margin-top: 15px; 
            font-size: 0.95rem; border-left: 4px solid var(--accent);
        }
        .deep-read-content img { width: 100%; border-radius: 6px; margin-bottom: 15px; }
        .deep-read-content h3 { margin-top: 0; font-size: 1.1rem; }
        .deep-read-content ul { padding-left: 20px; }
        
        .meta-line { font-size: 0.8rem; color: #9ca3af; margin-top: 10px; font-weight: 500; }
    </style>
</head>
<body>

    <header>
        <h1>BytePost 🚀</h1>
    </header>

    <div id="news-container">
        </div>

    <script>
        async function loadNews() {
            const response = await fetch('data.json');
            const data = await response.json();
            const container = document.getElementById('news-container');
            
            container.innerHTML = data.articles.map(article => `
                <div class="tldr-item">
                    <details>
                        <summary>
                            <span class="article-headline">${article.title}</span>
                            <span class="short-teaser">— ${article.teaser || 'Klicke für den 5-Minuten Deep Read...'}</span>
                        </summary>
                        
                        <div class="deep-read-content">
                            ${article.image_local ? `<img src="${article.image_local}" alt="Header">` : ''}
                            <div class="full-text">
                                ${article.content}
                            </div>
                            <div class="meta-line">
                                Datum: ${article.date} | Quelle: ${article.source} | Lesezeit: ${article.read}
                            </div>
                        </div>
                    </details>
                </div>
            `).join('');
        }
        loadNews();
    </script>
</body>
</html>
