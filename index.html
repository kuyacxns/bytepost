<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BytePost | Deep Reads für Devs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #38bdf8; --dim: #94a3b8;
        }
        body.light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #0284c7; --dim: #64748b;
        }
        * { box-sizing: border-box; transition: 0.2s ease; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            line-height: 1.6;
        }
        .wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Navigation & Filter */
        nav { 
            background: var(--bg); border-bottom: 1px solid var(--dim); 
            position: sticky; top: 0; z-index: 100; padding: 10px 0;
        }
        .nav-inner { display: flex; flex-direction: column; gap: 15px; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.5rem; text-decoration: none; color: var(--text); }
        .logo em { color: var(--accent); font-style: normal; }

        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-btn { 
            background: var(--card); border: 1px solid var(--dim); color: var(--text);
            padding: 6px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap;
        }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* Grid */
        .feed { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 30px; padding: 40px 0; 
        }
        .card { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            cursor: pointer; border: 1px solid transparent;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .tag { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--accent); }

        /* Modal & Reading Progress */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; justify-content: center; overflow-y: auto; z-index: 1000;
        }
        .modal { 
            background: var(--bg); width: 100%; max-width: 800px; 
            margin: 40px 10px; border-radius: 16px; position: relative; height: fit-content;
        }
        #progress-bar { 
            position: sticky; top: 0; height: 5px; background: var(--accent); 
            width: 0%; z-index: 10; border-radius: 0 5px 5px 0;
        }
        .modal-content { padding: 40px; }
        .modal-close { 
            position: absolute; top: 20px; right: 20px; background: none; 
            border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; 
        }

        /* Content Styling */
        .summary-box { background: var(--card); padding: 20px; border-left: 4px solid var(--accent); margin: 20px 0; }
        pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; font-family: 'Fira Code', monospace; }
        code { color: #8dd3f7; }

        @media (max-width: 600px) { .feed { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <div class="wrap nav-inner">
        <div class="nav-top">
            <a class="logo" href="#">Byte<em>Post</em></a>
            <button class="filter-btn" onclick="document.body.classList.toggle('light')">🌓 Theme</button>
        </div>
        <div class="filter-bar" id="filters">
            <button class="filter-btn active" onclick="filterData('All', this)">All</button>
            <button class="filter-btn" onclick="filterData('KI', this)">KI</button>
            <button class="filter-btn" onclick="filterData('Dev', this)">Dev</button>
            <button class="filter-btn" onclick="filterData('Data', this)">Data</button>
            <button class="filter-btn" onclick="filterData('Security', this)">Security</button>
        </div>
    </div>
</nav>

<div class="wrap">
    <div class="feed" id="feed">
        <div class="card" style="height: 400px; background: var(--card); opacity: 0.5;"></div>
        <div class="card" style="height: 400px; background: var(--card); opacity: 0.5;"></div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div id="progress-bar"></div>
        <button class="modal-close" onclick="document.getElementById('overlay').style.display='none'">✕</button>
        <div class="modal-content" id="modal-content"></div>
    </div>
</div>

<script>
    let ARTICLES = [];

    async function load() {
        try {
            const r = await fetch('data.json');
            const data = await r.json();
            ARTICLES = data.articles;
            render(ARTICLES);
        } catch (e) {
            document.getElementById('feed').innerHTML = "Fehler beim Laden der Daten.";
        }
    }

    function render(items) {
        const feed = document.getElementById('feed');
        feed.innerHTML = items.map(a => `
            <div class="card" onclick="openModal(${a.id})">
                <img src="${a.image}" class="card-img" alt="">
                <div class="card-body">
                    <div class="tag">${a.icon} ${a.tag}</div>
                    <h2 style="margin: 10px 0">${a.title}</h2>
                    <div style="font-size: 0.8rem; color: var(--dim)">
                        ${a.date} • ${a.read} Read • ${a.source}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function filterData(tag, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = tag === 'All' ? ARTICLES : ARTICLES.filter(a => a.tag === tag);
        render(filtered);
    }

    function openModal(id) {
        const a = ARTICLES.find(x => x.id === id);
        const overlay = document.getElementById('overlay');
        document.getElementById('modal-content').innerHTML = `
            <div class="tag">${a.tag}</div>
            <h1 style="font-size: 2.5rem; margin: 10px 0;">${a.title}</h1>
            <img src="${a.image}" style="width:100%; border-radius:12px; margin: 20px 0;">
            <div class="article-text">${a.content}</div>
        `;
        overlay.style.display = 'flex';
        overlay.scrollTop = 0;
    }

    // Progress Bar Logik
    document.getElementById('overlay').onscroll = function() {
        const winScroll = this.scrollTop;
        const height = this.scrollHeight - this.clientHeight;
        const scrolled = (winScroll / height) * 100;
        document.getElementById("progress-bar").style.width = scrolled + "%";
    };

    function closeModal(e) {
        document.getElementById('overlay').style.display = 'none';
    }

    load();
</script>

</body>
</html>
