<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BytePost — Tech News täglich in 5 Minuten</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --mono: 'Space Mono', monospace; --display: 'Syne', sans-serif; --body: 'DM Sans', sans-serif;
            --bg: #f5f5f7; --bg-card: #ffffff; --text: #1d1d1f; --text-2: #515154; --text-3: #86868b;
            --accent: #0071e3; --border: rgba(0,0,0,0.08); --radius: 14px; --t: 0.2s ease;
        }
        [data-theme="dark"] {
            --bg: #000; --bg-card: #1c1c1e; --text: #f5f5f7; --text-2: #aeaeb2; --text-3: #636366; --border: rgba(255,255,255,0.1);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--body); line-height: 1.6; transition: background var(--t), color var(--t); }
        .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

        nav { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border); height: 60px; display: flex; align-items: center; z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .nav-inner { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .logo { font-family: var(--display); font-size: 22px; font-weight: 800; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .logo em { color: var(--accent); font-style: normal; }
        .logo img { border-radius: 6px; }

        .theme-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; cursor: pointer; font-family: var(--mono); font-size: 11px; color: var(--text-2); transition: all var(--t); display: flex; align-items: center; gap: 6px; }
        .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

        .hero { padding: 80px 0; text-align: center; border-bottom: 1px solid var(--border); }
        .hero h1 { font-family: var(--display); font-size: clamp(40px, 8vw, 70px); line-height: 0.9; letter-spacing: -2px; margin-bottom: 20px; }
        .hero h1 em { color: var(--accent); font-style: normal; }
        .hero p { color: var(--text-3); font-size: 16px; }

        .filters { display: flex; gap: 8px; padding: 24px 0 0; flex-wrap: wrap; }
        .filter-btn { background: transparent; border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; cursor: pointer; font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--text-3); transition: all var(--t); text-transform: uppercase; }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .page-grid { display: grid; grid-template-columns: 1fr 300px; gap: 50px; padding: 0 0 60px; }
        .article { padding: 20px 0; border-bottom: 1px solid var(--border); cursor: pointer; display: grid; grid-template-columns: 1fr 80px; gap: 20px; transition: transform 0.2s; }
        .article:hover { transform: translateX(5px); }

        .article-title { font-size: 18px; font-weight: 600; margin: 6px 0 4px; transition: color var(--t); }
        .article:hover .article-title { color: var(--accent); }

        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-family: var(--mono); font-size: 10px; font-weight: 700; background: var(--accent); color: #fff; text-transform: uppercase; }
        .icon-box { font-size: 30px; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; border-radius: 10px; transition: transform var(--t); }
        .article:hover .icon-box { transform: scale(1.05); }

        .sidebar-card { background: var(--bg-card); padding: 20px; border-radius: 14px; border: 1px solid var(--border); margin-bottom: 16px; }
        .read-count { font-family: var(--mono); font-size: 28px; font-weight: 700; color: var(--accent); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: start; justify-content: center; padding: 40px 20px; z-index: 1000; backdrop-filter: blur(10px); overflow-y: auto; }
        .overlay.open { display: flex; }
        .modal { background: var(--bg-card); max-width: 700px; width: 100%; border-radius: 24px; position: relative; border: 1px solid var(--border); animation: modal-in 0.3s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden; }
        @keyframes modal-in { from { opacity: 0; transform: scale(0.95) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .modal-image { width: 100%; height: 300px; object-fit: cover; background: #222; }
        .modal-content-padding { padding: 40px; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; color: #fff; font-size: 18px; z-index: 10; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); transition: all var(--t); }
        .modal-close:hover { background: var(--accent); }

        .summary-box { background: var(--bg); padding: 20px; border-radius: 12px; margin: 20px 0; border-left: 4px solid var(--accent); }
        .summary-box h4 { font-family: var(--display); margin-bottom: 10px; color: var(--accent); }
        .modal-bd h3 { margin-top: 24px; font-family: var(--display); color: var(--text); }
        .modal-bd p { color: var(--text-2); margin-top: 10px; }
        .modal-bd ul { padding-left: 20px; color: var(--text-2); margin-top: 10px; }
        .modal-bd li { margin-bottom: 6px; }

        .empty-state { padding: 60px 0; text-align: center; color: var(--text-3); font-family: var(--mono); font-size: 13px; }

        @media (max-width: 900px) {
            .page-grid { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }

        @media (max-width: 600px) {
            .logo { font-size: 18px; }
            .logo img { width: 22px; height: 22px; }
            .theme-btn span#theme-label { display: none; }
            .theme-btn { padding: 6px 10px; }

            .hero { padding: 40px 0; }
            .hero p { font-size: 14px; }

            .filters { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 4px; }
            .filters::-webkit-scrollbar { display: none; }
            .filter-btn { flex-shrink: 0; }

            .article { grid-template-columns: 1fr 56px; gap: 12px; padding: 16px 0; }
            .article-title { font-size: 16px; }
            .icon-box { font-size: 22px; border-radius: 8px; }
            .article:hover { transform: none; }

            .overlay { padding: 0; align-items: flex-end; }
            .modal { border-radius: 20px 20px 0 0; max-height: 92vh; overflow-y: auto; animation: modal-mobile 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
            @keyframes modal-mobile { from { transform: translateY(100%); } to { transform: translateY(0); } }
            .modal-content-padding { padding: 24px 20px 40px; }
            .modal-image { height: 180px; }
            .modal-close { top: 14px; right: 14px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="wrap nav-inner">
            <a class="logo" href="#">
                <img src="./favicon.svg" width="28" height="28" alt="BytePost Icon">
                Byte<em>Post</em>
            </a>
            <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
                <span id="theme-icon">☀️</span> <span id="theme-label">Light</span>
            </button>
        </div>
    </nav>

    <div class="hero">
        <div class="wrap">
            <h1>Tech News.<br><em>In 5 Minuten.</em></h1>
            <p>Täglich kuratierte Deep-Reads — zusammengefasst mit KI.</p>
        </div>
    </div>

    <div class="wrap">
        <div class="filters" id="filters">
            <button class="filter-btn active" data-cat="all" onclick="setFilter('all', this)">Alle</button>
        </div>
        <div class="page-grid">
            <main id="feed"></main>
            <aside class="sidebar" style="padding-top:20px;">
                <div class="sidebar-card">
                    <h3>Deep Reading</h3>
                    <p style="font-size:14px; color:var(--text-3); margin-top:8px;">Klicke auf einen Artikel für die volle Analyse inkl. KI-Zusammenfassung.</p>
                </div>

            </aside>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="if(event.target.id==='overlay')closeModal()">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="m-img-container"></div>
            <div class="modal-content-padding">
                <span class="tag" id="m-tag"></span>
                <h2 id="m-title" style="font-family:var(--display); font-size:32px; margin:15px 0; line-height:1.1;"></h2>
                <p id="m-meta" style="color:var(--text-3); font-family:var(--mono); font-size:12px; margin-bottom:20px;"></p>
                <div id="m-body" class="modal-bd"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const saved = localStorage.getItem('bp_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeBtn(saved);
        })();

        function updateThemeBtn(theme) {
            const icon = document.getElementById('theme-icon');
            const label = document.getElementById('theme-label');
            if (!icon) return;
            if (theme === 'dark') { icon.textContent = '☀️'; label.textContent = 'Light'; }
            else { icon.textContent = '🌙'; label.textContent = 'Dark'; }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('bp_theme', next);
            updateThemeBtn(next);
        }

        let ARTICLES = [];
        let activeFilter = 'all';

        async function load() {
            try {
                const res = await fetch('./data.json');
                const data = await res.json();
                ARTICLES = data.articles;
                buildFilters();
                render();
            } catch (e) {
                document.getElementById('feed').innerHTML = '<div class="empty-state">⚠️ data.json konnte nicht geladen werden.</div>';
            }
        }

        function buildFilters() {
            const cats = [...new Set(ARTICLES.map(a => a.cat))];
            const container = document.getElementById('filters');
            cats.forEach(cat => {
                const tag = ARTICLES.find(a => a.cat === cat)?.tag || cat;
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.cat = cat;
                btn.textContent = tag;
                btn.onclick = () => setFilter(cat, btn);
                container.appendChild(btn);
            });
        }

        function setFilter(cat, btn) {
            activeFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const visible = activeFilter === 'all' ? ARTICLES : ARTICLES.filter(a => a.cat === activeFilter);
            if (visible.length === 0) {
                document.getElementById('feed').innerHTML = '<div class="empty-state">Keine Artikel in dieser Kategorie.</div>';
                return;
            }
            document.getElementById('feed').innerHTML = visible.map(a => `
                <div class="article" onclick="openArt('${a.id}')">
                    <div>
                        <span class="tag">${a.tag}</span>
                        <h3 class="article-title">${a.title}</h3>
                        <p style="color:var(--text-3); font-family:var(--mono); font-size:12px;">${a.source}${a.date ? ' · ' + a.date : ''} · ${a.read}</p>
                    </div>
                    <div class="icon-box">${a.icon}</div>
                </div>
            `).join('');
        }

        function openArt(id) {
            const a = ARTICLES.find(x => x.id === id);
            document.getElementById('m-tag').textContent = a.tag;
            document.getElementById('m-title').textContent = a.title;
            document.getElementById('m-meta').textContent = `${a.source}${a.date ? ' · ' + a.date : ''} · ${a.read} Lesezeit`;
            document.getElementById('m-body').innerHTML = a.content;
            document.getElementById('m-img-container').innerHTML = a.image_local ? `<img src="${a.image_local}" class="modal-image">` : '';
            document.getElementById('overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('overlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        load();
    </script>
</body>
</html>
