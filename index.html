<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BytePost — Tech News täglich in 5 Minuten</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --mono: 'Space Mono', monospace; --display: 'Syne', sans-serif; --body: 'DM Sans', sans-serif;
            --bg: #f5f5f7; --bg-card: #ffffff; --text: #1d1d1f; --text-2: #515154; --text-3: #86868b;
            --accent: #0071e3; --border: rgba(0,0,0,0.08); --radius: 14px; --t: 0.2s ease;
        }
        [data-theme="dark"] {
            --bg: #000; --bg-card: #1c1c1e; --text: #f5f5f7; --text-2: #aeaeb2; --text-3: #636366; --border: rgba(255,255,255,0.1);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--body); line-height: 1.6; transition: background var(--t), color var(--t); }
        .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

        nav { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border); height: 60px; display: flex; align-items: center; z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .nav-inner { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .logo { font-family: var(--display); font-size: 22px; font-weight: 800; text-decoration: none; color: var(--text); }
        .logo em { color: var(--accent); font-style: normal; }

        .hero { padding: 80px 0; text-align: center; border-bottom: 1px solid var(--border); }
        .hero h1 { font-family: var(--display); font-size: clamp(40px, 8vw, 70px); line-height: 0.9; letter-spacing: -2px; margin-bottom: 20px; }
        .hero h1 em { color: var(--accent); font-style: normal; }

        .page-grid { display: grid; grid-template-columns: 1fr 300px; gap: 50px; padding: 40px 0 60px; }
        .article { padding: 20px 0; border-bottom: 1px solid var(--border); cursor: pointer; display: grid; grid-template-columns: 1fr 80px; gap: 20px; transition: transform 0.2s; }
        .article:hover { transform: translateX(5px); }
        .article-title { font-size: 18px; font-weight: 600; margin: 6px 0 4px; }
        
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-family: var(--mono); font-size: 10px; font-weight: 700; background: var(--accent); color: #fff; text-transform: uppercase; }
        .icon-box { font-size: 30px; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; border-radius: 10px; }

        /* MODAL & BILDER */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: start; justify-content: center; padding: 40px 20px; z-index: 1000; backdrop-filter: blur(10px); overflow-y: auto; }
        .overlay.open { display: flex; }
        .modal { background: var(--bg-card); max-width: 700px; width: 100%; border-radius: 24px; position: relative; border: 1px solid var(--border); animation: modal-in 0.3s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden; }
        @keyframes modal-in { from { opacity: 0; transform: scale(0.95) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .modal-image { width: 100%; height: 300px; object-fit: cover; background: #222; }
        .modal-content-padding { padding: 40px; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; color: #fff; font-size: 18px; z-index: 10; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        
        .summary-box { background: var(--bg); padding: 20px; border-radius: 12px; margin: 20px 0; border-left: 4px solid var(--accent); }
        .modal-bd h3 { margin-top: 24px; font-family: var(--display); color: var(--text); }
        .modal-bd p { color: var(--text-2); margin-top: 10px; }
        .modal-bd ul { padding-left: 20px; color: var(--text-2); margin-top: 10px; }
    </style>
</head>
<body>
    <nav><div class="wrap nav-inner"><a class="logo" href="#">Byte<em>Post</em></a></div></nav>
    <div class="hero"><div class="wrap"><h1>Tech News.<br><em>In 5 Minuten.</em></h1><p>Täglich kuratierte Deep-Reads.</p></div></div>
    <div class="wrap"><div class="page-grid"><main id="feed"></main><aside style="padding-top:20px;"><div style="background:var(--bg-card); padding:20px; border-radius:14px; border:1px solid var(--border);"><h3>Deep Reading</h3><p style="font-size:14px; color:var(--text-3); margin-top:8px;">Klicke auf einen Artikel für die volle Analyse inkl. KI-Visualisierung.</p></div></aside></div></div>

    <div class="overlay" id="overlay" onclick="if(event.target.id==='overlay')closeModal()">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="m-img-container"></div>
            <div class="modal-content-padding">
                <span class="tag" id="m-tag"></span>
                <h2 id="m-title" style="font-family:var(--display); font-size:32px; margin:15px 0; line-height:1.1;"></h2>
                <div id="m-body" class="modal-bd"></div>
            </div>
        </div>
    </div>

    <script>
        let ARTICLES = [];
        async function load() {
            const res = await fetch('./data.json');
            const data = await res.json();
            ARTICLES = data.articles;
            render();
        }

        function render() {
            document.getElementById('feed').innerHTML = ARTICLES.map(a => `
                <div class="article" onclick="openArt('${a.id}')">
                    <div>
                        <span class="tag">${a.tag}</span>
                        <h3 class="article-title">${a.title}</h3>
                        <p style="color:var(--text-3); font-family:var(--mono); font-size:12px;">${a.source} · ${a.date}</p>
                    </div>
                    <div class="icon-box">${a.icon}</div>
                </div>
            `).join('');
        }

        function openArt(id) {
            const a = ARTICLES.find(x => x.id === id);
            document.getElementById('m-tag').textContent = a.tag;
            document.getElementById('m-title').textContent = a.title;
            document.getElementById('m-body').innerHTML = a.content;
            document.getElementById('m-img-container').innerHTML = a.image_local ? `<img src="${a.image_local}" class="modal-image">` : '';
            document.getElementById('overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }
        load();
    </script>
</body>
</html>
