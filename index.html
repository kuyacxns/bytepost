<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BytePost - Tech News</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #00ff88; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        #news-container { max-width: 800px; margin: 0 auto; }
        
        /* Dein Original-Karten Design */
        .article-card { 
            background: var(--card); border-radius: 12px; padding: 0; margin-bottom: 25px;
            border-left: 4px solid var(--accent); overflow: hidden; transition: 0.3s;
        }

        /* Das Bild dezent oben einfügen */
        .article-img { width: 100%; height: 200px; object-fit: cover; display: block; }
        
        .article-content-wrapper { padding: 25px; }
        .date-tag { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-bottom: 8px; display: block; }
        h2 { margin: 10px 0; color: #fff; font-size: 1.6rem; }
        .meta { font-size: 0.85rem; color: #888; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        .content { line-height: 1.6; color: #ccc; }
        .content h3 { color: #fff; font-size: 1.2rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="news-container">
        </div>

    <script>
        async function loadNews() {
            const response = await fetch('data.json');
            const data = await response.json();
            const container = document.getElementById('news-container');
            
            container.innerHTML = data.articles.map(article => `
                <div class="article-card">
                    ${article.image_local ? `<img src="${article.image_local}" class="article-img">` : ''}
                    <div class="article-content-wrapper">
                        <span class="date-tag">${article.date} • ${article.source}</span>
                        <h2>${article.icon || '🧠'} ${article.title}</h2>
                        <div class="content">${article.content}</div>
                        <div class="meta">Lesezeit: ${article.read}</div>
                    </div>
                </div>
            `).join('');
        }
        loadNews();
    </script>
</body>
</html>
